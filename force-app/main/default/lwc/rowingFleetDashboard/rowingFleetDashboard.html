<template>
    <lightning-card title="Fleet Dashboard" icon-name="standard:record">

        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="slds-var-m-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading fleet data..." size="medium"></lightning-spinner>
            </div>
        </template>

        <div class="slds-var-m-around_medium">

            <!-- ── Date Navigation ──────────────────────────────────────────── -->
            <div class="slds-grid slds-grid_vertical-align-center slds-var-m-bottom_medium date-nav">
                <div class="slds-col slds-no-flex">
                    <lightning-button-group>
                        <lightning-button
                            label="←"
                            title="Previous day"
                            variant="neutral"
                            onclick={handlePrevDay}>
                        </lightning-button>
                        <lightning-button
                            label="Today"
                            variant="neutral"
                            disabled={isToday}
                            onclick={handleToday}>
                        </lightning-button>
                        <lightning-button
                            label="→"
                            title="Next day"
                            variant="neutral"
                            disabled={isToday}
                            onclick={handleNextDay}>
                        </lightning-button>
                    </lightning-button-group>
                </div>
                <div class="slds-col slds-var-m-left_small">
                    <span class="slds-text-heading_small date-display">
                        <lightning-icon icon-name="utility:date_input" size="x-small" class="slds-var-m-right_x-small"></lightning-icon>
                        {selectedDateFormatted}
                    </span>
                </div>
            </div>

            <!-- ── Session Filter Tabs ───────────────────────────────────────── -->
            <div class="slds-var-m-bottom_medium">
                <lightning-button-group>
                    <lightning-button
                        label="Morning"
                        variant={morningVariant}
                        data-value="Morning"
                        onclick={handleSessionTypeChange}>
                    </lightning-button>
                    <lightning-button
                        label="Afternoon"
                        variant={afternoonVariant}
                        data-value="Afternoon"
                        onclick={handleSessionTypeChange}>
                    </lightning-button>
                    <lightning-button
                        label="All Day"
                        variant={allDayVariant}
                        data-value="All Day"
                        onclick={handleSessionTypeChange}>
                    </lightning-button>
                </lightning-button-group>
            </div>

            <!-- ── Summary Bar ───────────────────────────────────────────────── -->
            <template if:false={isLoading}>
                <div class="slds-grid slds-gutters slds-var-m-bottom_medium summary-bar">
                    <div class="slds-col summary-tile summary-tile_available">
                        <p class="slds-text-heading_medium">{countAvailable}</p>
                        <p class="slds-text-body_small">Available</p>
                    </div>
                    <div class="slds-col summary-tile summary-tile_inuse">
                        <p class="slds-text-heading_medium">{countInUse}</p>
                        <p class="slds-text-body_small">In Use</p>
                    </div>
                    <div class="slds-col summary-tile summary-tile_repair">
                        <p class="slds-text-heading_medium">{countUnderRepair}</p>
                        <p class="slds-text-body_small">Under Repair</p>
                    </div>
                    <div class="slds-col summary-tile summary-tile_issues">
                        <p class="slds-text-heading_medium">{countOpenIssues}</p>
                        <p class="slds-text-body_small">Open Issues</p>
                    </div>
                </div>

                <!-- ── Error State ─────────────────────────────────────────── -->
                <template if:true={error}>
                    <div class="slds-box slds-theme_error slds-var-m-bottom_medium">
                        <p>{error}</p>
                    </div>
                </template>

                <!-- ── Fleet Table ─────────────────────────────────────────── -->
                <template if:true={hasFleetData}>
                    <div class="table-container">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_fixed-layout">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col" class="slds-text-title_caps">Boat Name</th>
                                    <th scope="col" class="slds-text-title_caps col-capacity">Capacity</th>
                                    <th scope="col" class="slds-text-title_caps col-status">Status</th>
                                    <th scope="col" class="slds-text-title_caps col-session">Session Slot</th>
                                    <th scope="col" class="slds-text-title_caps col-crew">Crew</th>
                                    <th scope="col" class="slds-text-title_caps col-issues">Issues</th>
                                    <th scope="col" class="slds-text-title_caps col-actions">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={fleetData} for:item="item">
                                    <!-- Main data row -->
                                    <tr key={item.boat.Id}
                                        class={item.rowClass}
                                        onclick={handleRowClick}
                                        data-boat-id={item.boat.Id}>
                                        <td data-label="Boat Name">
                                            <span class="slds-truncate">{item.boat.Name}</span>
                                        </td>
                                        <td data-label="Capacity" class="col-capacity">
                                            <span class="slds-truncate">{item.boat.Capacity__c}</span>
                                        </td>
                                        <td data-label="Status" class="col-status">
                                            <lightning-badge label={item.boat.Status__c} class={item.statusBadgeClass}></lightning-badge>
                                        </td>
                                        <td data-label="Session Slot" class="col-session">
                                            <span class="slds-truncate">{item.sessionSlot}</span>
                                        </td>
                                        <td data-label="Crew" class="col-crew">
                                            <span class="slds-truncate">{item.crewDisplay}</span>
                                        </td>
                                        <td data-label="Issues" class="col-issues" onclick={handleStopPropagation}>
                                            <template if:true={item.hasIssues}>
                                                <lightning-badge label={item.openIssueCount} class="badge-issue-red"></lightning-badge>
                                            </template>
                                            <template if:false={item.hasIssues}>
                                                <span class="slds-text-color_success">—</span>
                                            </template>
                                        </td>
                                        <td data-label="Actions" class="col-actions" onclick={handleStopPropagation}>
                                            <lightning-button-menu
                                                alternative-text="Set Status"
                                                label="Set Status"
                                                variant="border-filled"
                                                menu-alignment="right"
                                                data-boat-id={item.boat.Id}
                                                onselect={handleSetStatus}>
                                                <lightning-menu-item value="Available" label="Available" data-boat-id={item.boat.Id}></lightning-menu-item>
                                                <lightning-menu-item value="Under Repair" label="Under Repair" data-boat-id={item.boat.Id}></lightning-menu-item>
                                            </lightning-button-menu>
                                        </td>
                                    </tr>

                                    <!-- Expanded detail row -->
                                    <template if:true={item.isExpanded}>
                                        <tr key={item.detailRowKey} class="detail-row">
                                            <td colspan="7" class="slds-var-p-around_medium detail-cell">
                                                <div class="slds-grid slds-gutters">

                                                    <!-- Crew list -->
                                                    <div class="slds-col">
                                                        <h4 class="slds-text-title_caps slds-var-m-bottom_x-small">Full Crew</h4>
                                                        <template if:true={item.hasCrewNames}>
                                                            <ul class="slds-list_dotted">
                                                                <template for:each={item.crewNames} for:item="name">
                                                                    <li key={name}>{name}</li>
                                                                </template>
                                                            </ul>
                                                        </template>
                                                        <template if:false={item.hasCrewNames}>
                                                            <p class="slds-text-color_weak">No crew assigned</p>
                                                        </template>
                                                    </div>

                                                    <!-- Session details -->
                                                    <div class="slds-col">
                                                        <h4 class="slds-text-title_caps slds-var-m-bottom_x-small">Session Details</h4>
                                                        <template if:true={item.session}>
                                                            <p><strong>Type:</strong> {item.session.Session_Type__c}</p>
                                                            <p><strong>Start:</strong> {item.sessionStartFormatted}</p>
                                                            <p><strong>End:</strong> {item.sessionEndFormatted}</p>
                                                            <p><strong>Status:</strong> {item.session.Status__c}</p>
                                                        </template>
                                                        <template if:false={item.session}>
                                                            <p class="slds-text-color_weak">No session scheduled</p>
                                                        </template>
                                                    </div>

                                                    <!-- Open issues -->
                                                    <div class="slds-col">
                                                        <h4 class="slds-text-title_caps slds-var-m-bottom_x-small">Open Issues</h4>
                                                        <template if:true={item.hasIssues}>
                                                            <ul class="slds-list_dotted">
                                                                <template for:each={item.session.Boat_Issues__r} for:item="issue">
                                                                    <li key={issue.Id}>
                                                                        <span class="slds-var-m-right_x-small">{issue.Issue_Type__c}</span>
                                                                        <lightning-badge label={issue.Severity__c} class={issue.severityBadgeClass}></lightning-badge>
                                                                    </li>
                                                                </template>
                                                            </ul>
                                                        </template>
                                                        <template if:false={item.hasIssues}>
                                                            <p class="slds-text-color_success">No open issues</p>
                                                        </template>
                                                    </div>

                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- ── Empty State ─────────────────────────────────────────── -->
                <template if:false={hasFleetData}>
                    <template if:false={error}>
                        <div class="slds-illustration slds-illustration_small slds-var-m-top_large empty-state">
                            <div class="slds-text-longform slds-text-align_center">
                                <lightning-icon icon-name="standard:record" size="large" class="slds-var-m-bottom_small"></lightning-icon>
                                <p class="slds-text-heading_medium">No fleet data</p>
                                <p class="slds-text-body_regular">No boats found for the selected date and session filter.</p>
                            </div>
                        </div>
                    </template>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
